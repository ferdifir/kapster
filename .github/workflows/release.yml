name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Authenticate git with PAT
        run: |
          git config --global credential.helper store
          echo "https://ferdifir:${GH_TOKEN}@github.com" > ~/.git-credentials
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 109.111.53.58
          port: 38954
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kapster
            git pull
            npm ci --no-optional
            npm install --no-save lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu
            npm run build
            pm2 reload kapster --update-env
